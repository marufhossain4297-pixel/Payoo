<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | SignUp</title>
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
    <!-- tailwind and daisyui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-[#f4f5f7] mx-auto">
    <section>
        <div class="logo w-[200px] mx-auto pt-[120px]">
            <img src="./images/Logo-full.png" alt="">
        </div>
    </section>
    <section class="w-11/12 mx-auto py-8 space-y-3 text-center">
        <h2 class="text-[24px] font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
    </section>
    <section>
        <h1 class="text-[20px] font-bold pl-5 pt-10 pb-7">Pin creation</h1>
        <fieldset class="fieldset bg-white border-base-300 mx-auto rounded-3xl w-[90%] border p-4 space-y-3">

            <label class="label text-neutral font-medium text-[16px] ">Create pin</label>
            <input id="pin-verification" type="password" class="input rounded-full bg-[#F4F5F7] w-full" minlength="4" maxlength="4" placeholder="Enter your 4 digit pin '1234' " />

            <label class="label text-neutral font-medium text-[16px] ">Confirm pin</label>
            <input id="pin-confirmation-verification" type="password" class="input rounded-full bg-[#F4F5F7] w-full" minlength="4" maxlength="4" placeholder="Enter your 4 digit pin" />


            <button id="signup-btn" class="btn btn-primary rounded-full mt-4">SignUp<i class="fa-solid fa-arrow-right"
                    style="color: rgb(255, 255, 255);"></i>
            </button>
        </fieldset>
    </section>
    <script>
        document.getElementById('signup-btn')
        .addEventListener('click', function(){
            const pinVerification = document.getElementById('pin-verification');
            const pinVerificationValue = pinVerification.value;
            console.log(pinVerificationValue)
            if(pinVerificationValue === ''){
                alert('Please enter PIN')
                return
            }
            else if (pinVerificationValue !== '1234') {
                alert('Password is invalid ❌')
                return
            }

            
            const pinConfirmationVerification = document.getElementById('pin-confirmation-verification');
            const pinConfirmationVerificationValue = pinConfirmationVerification.value;
            console.log(pinConfirmationVerificationValue)
            if(pinConfirmationVerificationValue === ''){
                alert('Please confirm PIN')
                return
            }
            else if (pinConfirmationVerificationValue !== pinVerificationValue) {
                alert('Passwords do not match ❌')
                return
            }
            window.location.assign('/success.html')
        })
    </script>
</body>

</html>
